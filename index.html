<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Operasi Pink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOCK SCREEN -->
    <div id="lockScreen" class="screen lock-screen">
        <div class="status-bar">
            <span>Operator</span>
            <div class="status-icons">
                <span>📶 5G</span>
                <span>🔋</span>
            </div>
        </div>
    
        <div class="lock-main-content">
            <h1 id="lockTime">00.00</h1>
            <p id="lockDate" class="lock-date">Memuat Tanggal...</p>
        </div>
    
        <div class="swipe-area" id="touchArea">
            <span class="arrow-up">⇧</span>
            <p>Usap ke atas</p>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen login-screen" style="display: none;">
        <div class="login-overlay">
            
            <div class="back-btn" onclick="backToLock()">❮ Kembali</div>
    
            <div class="login-container">
                <div class="profile-section">
                    <div class="avatar-circle">
                        <img src="asset/gallery/6.jpeg" alt="User">
                    </div>
                    <h2 class="username">RISKA SITI NURAZIZAH</h2>
                </div>
    
                <div class="login-form">
                    <div class="input-box user-box" style="display: none;">
                        <input type="text" value="RISKA SITI NURAZIZAH" readonly>
                    </div>
                    <div class="input-box pass-box">
                        <input type="password" id="passwordField" placeholder="Masukkan Password">
                        <button class="submit-btn" onclick="goToDesktop()">➔</button>
                    </div>
                    <a href="#" class="sign-in-options">Lupa Password?</a>
                </div>
            </div>
    
            <div class="login-footer">
                <div class="footer-icons">
                    <span title="Bantuan Akses">💻</span>
                    <span title="Mulai Ulang">↻</span>
                    <span title="Daya">⏻</span>
                </div>
            </div>
        </div>
    </div>
   
    <script src="script.js"></script>
</body>
</html>
