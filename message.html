<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message for You</title>
    <!-- Use Google Fonts for elegance -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; font-family: 'Inter', sans-serif;
        }

        .desktop-screen {
            background: url('https://i.pinimg.com/1200x/37/f9/6e/37f96e5603307d23ac4a1013f478fbea.jpg') no-repeat center center;
            background-size: cover;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* Jendela Program Windows - Glassmorphism Elegant */
        .window {
            width: 90%; max-width: 420px;
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            display: flex; flex-direction: column;
            animation: zoomIn 0.4s cubic-bezier(0.165, 0.840, 0.440, 1.000);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
        }

        @keyframes zoomIn { 
            from { transform: translateY(20px) scale(0.95); opacity: 0; } 
            to { transform: translateY(0) scale(1); opacity: 1; } 
        }

        /* Title Bar Minimalis */
        .title-bar {
            padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.4);
        }

        .title-left { 
            font-size: 13px; color: #555; display: flex; align-items: center; gap: 8px; font-weight: 500; letter-spacing: 0.5px;
        }
        
        .title-controls { display: flex; gap: 12px; font-size: 16px; color: #999; }
        .close-btn { transition: color 0.2s; }
        .close-btn:hover { color: #ff4757; cursor: pointer; }

        /* Area Konten Pesan */
        .content-body {
            padding: 40px 30px;
            height: 480px; overflow-y: auto;
            position: relative;
        }
        
        /* Custom Scrollbar */
        .content-body::-webkit-scrollbar { width: 4px; }
        .content-body::-webkit-scrollbar-track { background: transparent; }
        .content-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* Teks Judul Serif Elegant */
        .birthday-title {
            text-align: center; 
            font-family: 'Playfair Display', serif;
            font-size: 26px; 
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 35px;
        }

        .birthday-title span {
            display: block;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            color: #888;
            margin-top: 6px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .message-content {
            color: #333; line-height: 1.8; font-size: 14.5px;
            white-space: pre-line;
            font-weight: 300;
            text-align: left;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background-color: #333;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Taskbar Bawah */
        .desktop-taskbar {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-top: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.9);
        }

        .taskbar-left { display: flex; align-items: center; gap: 20px; }
        .active-icon-container { position: relative; display: flex; align-items: center; height: 100%; }
        .active-app-indicator {
            font-size: 18px; position: relative;
        }
        .active-app-indicator::after {
            content: ''; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: white; border-radius: 50%;
        }
        
        .taskbar-right { text-align: right; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="desktop-screen">
        <div class="window">
            <div class="title-bar">
                <div class="title-left">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    Messages
                </div>
                <div class="title-controls">
                    <span>—</span> <span>❐</span> <span class="close-btn" onclick="location.href='desktop.html'">×</span>
                </div>
            </div>

            <div class="content-body" onclick="skipTypewriter()">
                <div class="birthday-title">
                    Happy Birthday
                    <span>A special message for you</span>
                </div>

                <div class="message-content"><span id="typewriter"></span><span class="typing-cursor" id="cursor"></span></div>
            </div>
        </div>

        <div class="desktop-taskbar">
            <div class="taskbar-left">
                <span style="font-size: 20px; cursor:pointer;" onclick="location.href='desktop.html'">⊞</span>
                <span style="font-size: 16px;">🔍</span>
                <div class="active-icon-container">
                    <div class="active-app-indicator">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </div>
                </div>
            </div>
            <div class="taskbar-right">
                <div id="time">00.00</div>
                <div id="date">00/00/0000</div>
            </div>
        </div>
    </div>

    <script>
        const msg = `Hi Riska Siti Nurazizah,

Happy Birthday Sayaanggg!

Selamat ulang tahun yaaaa 🤍🤍🤍🤍 Semoga di ulang tahun yang ke 17 ini membawa kebahagiaan baru buat kamu dan buat kita juga.

Aku juga percaya, di umur kamu yang sekarang ini, kamu bisa jadi pribadi yang lebih baik lagi, lebih dewasa lagi, dan lebih sukses lagi.

Makasiiii yaaaa udah jadi orang yang baik buat aku, dan selalu bisa bikin aku bahagia. Jujur, aku juga bersyukur bisa kenal sama kamu. 

Semoga apapun yang di ucapkan yang baik baikk sama orang lain, terkabul yaaa aaamiinnn.

maaff gaa banyak kata kata disini, tapii....

Happy Birthday again, Riskaaaaa anak hebat! 🎂🤍`;

        let i = 0;
        let isTyping = true;
        let timer;
        const cursor = document.getElementById('cursor');

        function startTyping() {
            const el = document.getElementById('typewriter');
            timer = setInterval(() => {
                if (i < msg.length) {
                    el.innerHTML += msg.charAt(i);
                    i++;
                    const body = document.querySelector('.content-body');
                    body.scrollTop = body.scrollHeight;
                } else {
                    clearInterval(timer);
                    isTyping = false;
                    cursor.style.display = 'none';
                }
            }, 45); // Kecepatan ketikan yang nyaman dibaca
        }

        function skipTypewriter() {
            if (isTyping) {
                clearInterval(timer);
                document.getElementById('typewriter').innerHTML = msg;
                isTyping = false;
                cursor.style.display = 'none';
                const body = document.querySelector('.content-body');
                body.scrollTop = body.scrollHeight;
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.getHours().toString().padStart(2,'0') + "." + now.getMinutes().toString().padStart(2,'0');
            document.getElementById('date').textContent = now.getDate().toString().padStart(2,'0') + "/" + (now.getMonth()+1).toString().padStart(2,'0') + "/" + now.getFullYear();
        }

        window.onload = () => {
            updateClock();
            setInterval(updateClock, 1000);
            setTimeout(startTyping, 500); // Memberikan sedikit delay 0.5 detik sebelum mulai mengetik agar terlihat natural
        };
    </script>
</body>
</html>
