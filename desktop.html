<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <audio id="bgm" loop>
      <source src="music/Love-wave to earth (instrumental).mp3" type="audio/mpeg">
    </audio>
</head>
<body>
    <div class="desktop-screen">
        <div class="desktop-status-bar">
            <span>Operator</span>
            <div class="status-icons">
                <span>📶 5G</span>

            </div>
        </div>
    
        <div class="app-grid">
            <div class="app-item" onclick="window.location.href='message.html'">

                <span>Pesan</span>
            </div>
            <div class="app-item" onclick="window.location.href='spotify.html'">
                <img src="asset/5e07ce22d9a85aa2c752df5c82d9fea6-removebg-preview.png" class="app-icon" onerror="this.src='https://win98icons.alexmeub.com/icons/png/cd_audio_cd_a-4.png'">
                <span>Spotify</span>
            </div>
            <div class="app-item" onclick="window.location.href='gallery.html'">
                <img src="https://win98icons.alexmeub.com/icons/png/briefcase-2.png" class="app-icon" onerror="this.src='https://img.icons8.com/color/48/000000/image-gallery.png'">
                <span>Galeri</span>
            </div>
            <div class="app-item" onclick="window.location.href='paint.html'">
                <img src="https://win98icons.alexmeub.com/icons/png/paint_old-0.png" class="app-icon" onerror="this.src='https://img.icons8.com/color/48/000000/paint-palette.png'">
                <span>Cat</span>
            </div>

            <div class="app-item" onclick="window.location.href='https://aryaabaik.github.io/ptobooth-ayayoy/layout.html'">
                <img src="asset/e0c19d9ac380ac1448d07c4377c371af-removebg-preview.png" class="app-icon" onerror="this.src='https://win98icons.alexmeub.com/icons/png/camera3-2.png'">
                <span>Stan foto</span>
            </div>
            <div class="app-item" onclick="window.location.href='camera.html'">
                <img src="https://win98icons.alexmeub.com/icons/png/camera-2.png" class="app-icon" onerror="this.src='https://img.icons8.com/color/48/000000/camera.png'">
                <span>Kamera</span>
            </div>
            <div class="app-item" onclick="window.location.href='flow.index.html'">
                <img src="asset/gift.png" class="app-icon" onerror="this.src='https://win98icons.alexmeub.com/icons/png/msn3-5.png'">
                <span>Bunga</span>
            </div>
            <div class="app-item" onclick="window.location.href='tetris.html'">
                <img src="data:image/svg+xml;utf8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 150 150'%3e%3crect x='55' y='15' width='40' height='40' fill='%232196F3' stroke='%231976D2' stroke-width='4' rx='4'/%3e%3crect x='15' y='55' width='40' height='40' fill='%232196F3' stroke='%231976D2' stroke-width='4' rx='4'/%3e%3crect x='55' y='55' width='40' height='40' fill='%232196F3' stroke='%231976D2' stroke-width='4' rx='4'/%3e%3crect x='95' y='55' width='40' height='40' fill='%232196F3' stroke='%231976D2' stroke-width='4' rx='4'/%3e%3c/svg%3e" class="app-icon">
                <span>Tetris</span>
            </div>

            <div class="app-item" onclick="window.location.href='galaxy.html'">
                <img src="asset/Галактика__Galaxy__Pixel_art-removebg-preview.png" class="app-icon">
                <span>Galaxy</span>
            </div>
            
            <div class="app-item" onclick="window.location.href='sorry/index.html'">
                <img src="https://i.ibb.co.com/hXZsYxZ/heart.png" class="app-icon" onerror="this.src='https://win98icons.alexmeub.com/icons/png/message_envelope_open-0.png'">
                <span>Tanya</span>
            </div>
        </div>
        
        <div class="music-toggle" onclick="toggleMusic()" id="musicBtn">
            <img src="https://img.icons8.com/color/48/000000/high-volume--v1.png" alt="Music" id="musicIconImg">
            <span>On/Off Music</span>
        </div>

        <div class="desktop-taskbar">
            <div class="taskbar-left">
                <button class="win-btn">⊞</button>
                <button class="search-btn">🔍</button>
            </div>
            <div class="taskbar-right">
                <div id="taskbar-time" class="taskbar-time">00.00</div>
                <div id="taskbar-date" class="taskbar-date">00/00/0000</div>
            </div>
        </div>
    </div>

    <!-- Script Music & Jam -->
    <script>
        function updateClock() {
            const sekarang = new Date();
            const jam = String(sekarang.getHours()).padStart(2, '0');
            const menit = String(sekarang.getMinutes()).padStart(2, '0');
            const tgl = String(sekarang.getDate()).padStart(2, '0');
            const bln = String(sekarang.getMonth() + 1).padStart(2, '0');
            const thn = sekarang.getFullYear();
            document.getElementById('taskbar-time').textContent = `${jam}.${menit}`;
            document.getElementById('taskbar-date').textContent = `${tgl}/${bln}/${thn}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const audio = document.getElementById('bgm');
        const musicIcon = document.getElementById('musicIconImg');

        const iconOn = "https://img.icons8.com/color/48/000000/high-volume--v1.png";
        const iconOff = "https://img.icons8.com/color/48/000000/mute--v1.png";

        window.addEventListener('load', () => {
            const savedTime = localStorage.getItem('audioTime');
            const savedStatus = localStorage.getItem('audioIsPlaying');

            if (savedTime) {
                audio.currentTime = parseFloat(savedTime);
            }

            if (savedStatus === 'true') {
                audio.play().then(() => {
                    musicIcon.src = iconOn;
                }).catch(() => {
                    console.log("Menunggu klik user untuk lanjut musik...");
                    musicIcon.src = iconOff;
                });
            } else {
                musicIcon.src = iconOff;
            }
        });

        setInterval(() => {
            if (!audio.paused) {
                localStorage.setItem('audioTime', audio.currentTime);
                localStorage.setItem('audioIsPlaying', 'true');
            } else {
                localStorage.setItem('audioIsPlaying', 'false');
            }
        }, 100);

        document.addEventListener('click', () => {
            if (audio.paused && localStorage.getItem('audioIsPlaying') !== 'false') {
                audio.play();
                musicIcon.src = iconOn;
                localStorage.setItem('audioIsPlaying', 'true');
            }
        }, { once: true });

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicIcon.src = iconOn;
                localStorage.setItem('audioIsPlaying', 'true');
            } else {
                audio.pause();
                musicIcon.src = iconOff;
                localStorage.setItem('audioIsPlaying', 'false');
            }
        }
    </script>
</body>
</html>
